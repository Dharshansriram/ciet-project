<script>
/**
 * Aptitude Quiz Controller
 * -------------------------
 * Same API layer and state pattern as dsa-phase.js.
 * State is a single object. API calls return {ok, data, error}.
 * No page reloads. Answers preserved on navigation.
 */
"use strict";

const API_BASE = "http://localhost:5000/api/training";
const _p       = new URLSearchParams(location.search);
const TOPIC    = _p.get("topic") || "Ratio & Proportion";

const state = {
  questions:    [],
  currentIndex: 0,
  answers:      {},   // { [index]: { submitted, selectedIdx, correct, explanation } }
  timerSec:     0,
  timerInterval:null,
  toastTimer:   null,
};

const api = {
  async call(method, path, body) {
    try {
      const res  = await fetch(`${API_BASE}${path}`, {
        method,
        headers: { "Content-Type": "application/json" },
        body:    body ? JSON.stringify(body) : undefined,
      });
      const data = await res.json();
      if (!res.ok || !data.success) return { ok:false, data:null, error: data.message || `HTTP ${res.status}` };
      return { ok:true, data, error:null };
    } catch(err) {
      return { ok:false, data:null, error: "Backend offline. Run: cd Backend && npm run dev" };
    }
  },
  get:  (path)       => api.call("GET",  path),
  post: (path, body) => api.call("POST", path, body),
};

// ── Init ──────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("bcTopic").textContent = TOPIC;
  loadQuestions();
  startTimer();
});

async function loadQuestions() {
  const { ok, data, error } = await api.get(`/aptitude/questions/${encodeURIComponent(TOPIC)}`);
  if (!ok || !data.questions?.length) {
    document.getElementById("quizWrap").innerHTML =
      `<p style="color:var(--muted);text-align:center;padding:40px 0">${ok ? "No questions found." : `⚠️ ${esc(error)}`}</p>`;
    return;
  }
  state.questions = data.questions;
  renderQNav();
  renderProgressTrack();
  navigateTo(0);
}

// ── Timer ─────────────────────────────────────────────────────────
function startTimer() {
  state.timerInterval = setInterval(() => {
    state.timerSec++;
    const m = Math.floor(state.timerSec / 60);
    const s = state.timerSec % 60;
    document.getElementById("timerBadge").textContent = `⏱ ${m}:${String(s).padStart(2, "0")}`;
  }, 1000);
}

// ── Navigation ────────────────────────────────────────────────────
function navigateTo(idx) {
  if (idx < 0 || idx >= state.questions.length) return;
  state.currentIndex = idx;
  document.getElementById("prevBtn").disabled    = idx === 0;
  document.getElementById("nextBtn").textContent = idx === state.questions.length - 1 ? "Finish ✓" : "Next →";
  document.getElementById("qProgress").textContent = `${idx+1} / ${state.questions.length}`;
  updateQNav();
  updateProgressTrack();
  renderQuestion(idx);
  document.querySelector(".main-area").scrollTop = 0;
}

function prevQuestion() { navigateTo(state.currentIndex - 1); }
function nextQuestion() {
  if (state.currentIndex < state.questions.length - 1) navigateTo(state.currentIndex + 1);
  else finishQuiz();
}

// ── Q-Nav ─────────────────────────────────────────────────────────
function renderQNav() {
  const nav = document.getElementById("qNav");
  nav.innerHTML = "";
  state.questions.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "q-dot"; d.dataset.i = i; d.textContent = i + 1;
    d.addEventListener("click", () => navigateTo(i));
    nav.appendChild(d);
  });
}
function updateQNav() {
  document.querySelectorAll(".q-dot").forEach((d, i) => {
    const a = state.answers[i];
    d.dataset.state = i === state.currentIndex ? "active" : a?.correct===true ? "pass" : a?.correct===false ? "fail" : "";
  });
}
function renderProgressTrack() {
  const t = document.getElementById("progressTrack"); t.innerHTML = "";
  state.questions.forEach((_, i) => {
    const d = document.createElement("div"); d.className="p-dot"; d.dataset.pi=i; t.appendChild(d);
  });
}
function updateProgressTrack() {
  document.querySelectorAll(".p-dot").forEach((d, i) => {
    const a = state.answers[i];
    d.className = "p-dot" + (i===state.currentIndex?" active":a?.correct===true?" pass":a?.correct===false?" fail":"");
  });
}

// ── Render Question ───────────────────────────────────────────────
function renderQuestion(idx) {
  const q     = state.questions[idx];
  const saved = state.answers[idx];
  const wrap  = document.getElementById("quizWrap");
  const L     = ["A","B","C","D"];

  let html = `
    <div class="q-card">
      <div class="q-meta">
        <span class="q-num">Q${idx+1}</span>
        <span class="q-topic-tag">${esc(TOPIC)}</span>
      </div>
      <div class="q-text">${esc(q.question)}</div>
      <div class="options" id="optWrap">`;

  (q.options || []).forEach((text, i) => {
    const cls = ["option"];
    if (saved?.submitted) {
      cls.push("locked");
      if (i === q.answer)        cls.push("correct");
      else if (i === saved.selectedIdx && saved.selectedIdx !== q.answer) cls.push("wrong");
    } else if (saved?.selectedIdx === i) {
      cls.push("selected");
    }
    html += `<div class="${cls.join(" ")}" data-opt="${i}">
      <span class="opt-letter">${L[i]}</span>
      <span>${esc(text)}</span>
    </div>`;
  });

  html += `</div>`;

  if (saved?.submitted) {
    const isCorrect = saved.correct;
    html += `<div class="explanation ${isCorrect?`correct`:`wrong`}>
      ${isCorrect?`✅ Correct! `:`❌ Wrong. Correct: ${L[q.answer]} — ${esc(q.options?.[q.answer]||"")}.`}
      ${esc(saved.explanation || "")}
    </div>`;
    // Fix the template literal in the above (it won't work server-rendered)
    // We'll fix this by building it properly:
  } else {
    html += `<div class="submit-row">
      <button class="btn btn-primary" id="subBtn">Submit Answer</button>
    </div>`;
  }
  html += `</div>`;

  wrap.innerHTML = html;

  // Fix the explanation for submitted state (rebuild properly)
  if (saved?.submitted) {
    const expEl = wrap.querySelector(".explanation");
    if (expEl) {
      const isCorrect = saved.correct;
      expEl.innerHTML = isCorrect
        ? `✅ Correct! ${esc(saved.explanation || "")}`
        : `❌ Wrong. Correct answer: <strong>${L[q.answer]} — ${esc((q.options||[])[q.answer]||"")}</strong><br/>${esc(saved.explanation || "")}`;
    }
  }

  // Wire option clicks
  if (!saved?.submitted) {
    wrap.querySelectorAll(".option").forEach((el) => {
      el.addEventListener("click", () => selectOption(idx, Number(el.dataset.opt)));
    });
    document.getElementById("subBtn")?.addEventListener("click", () => submitAnswer(idx, q));
  }
}

function selectOption(idx, optIdx) {
  if (!state.answers[idx]) state.answers[idx] = {};
  state.answers[idx].selectedIdx = optIdx;
  document.querySelectorAll(".option").forEach((el) => el.classList.remove("selected"));
  document.querySelector(`.option[data-opt="${optIdx}"]`)?.classList.add("selected");
}

async function submitAnswer(idx, q) {
  const sel = state.answers[idx]?.selectedIdx;
  if (sel === undefined) { showToast("Select an option first", "info"); return; }

  const btn = document.getElementById("subBtn");
  btn.disabled = true; btn.textContent = "Checking…";

  const { ok, data, error } = await api.post("/aptitude/check", {
    topicName:     TOPIC,
    questionId:    q.id,
    selectedIndex: sel,
  });

  let correct, explanation;
  if (ok) {
    correct     = data.correct;
    explanation = data.explanation;
    // Server sends correct answer index — use it for display
    q.answer    = data.correctIndex; // patch locally for visual rendering
  } else {
    correct     = (sel === q.answer);
    explanation = q.explanation || "";
    if (error) showToast("⚠️ Offline — checking locally", "info");
  }

  state.answers[idx] = { submitted:true, selectedIdx:sel, correct, explanation };
  saveProgress();

  // Re-render to show result (clean re-render, no partial DOM hacks)
  renderQuestion(idx);
  updateQNav();
  updateProgressTrack();

  showToast(correct ? "✅ Correct!" : "❌ Wrong answer", correct ? "pass" : "fail");
}

// ── Finish Quiz ───────────────────────────────────────────────────
function finishQuiz() {
  clearInterval(state.timerInterval);
  const total   = state.questions.length;
  const correct = Object.values(state.answers).filter(a => a?.correct).length;
  const pct     = total > 0 ? Math.round(correct / total * 100) : 0;

  document.getElementById("modalEmoji").textContent  = pct >= 80 ? "🎉" : "📚";
  document.getElementById("modalTitle").textContent  = pct >= 80 ? "Excellent!" : pct >= 60 ? "Good Job!" : "Keep Practicing!";
  document.getElementById("modalBody").textContent   = `${correct} / ${total} correct  •  ${document.getElementById("timerBadge").textContent.slice(2)}`;
  document.getElementById("scoreDisplay").textContent = `${pct}%`;
  document.getElementById("completionModal").classList.remove("hidden");
}

function closeModal() { document.getElementById("completionModal").classList.add("hidden"); }

// ── Progress ──────────────────────────────────────────────────────
function saveProgress() {
  try {
    const all  = JSON.parse(localStorage.getItem("ciet_progress") || "{}");
    const done = Object.values(state.answers).filter(a => a?.correct).length;
    all[`apt::${TOPIC}`] = { correct:done, total:state.questions.length, ts:Date.now() };
    localStorage.setItem("ciet_progress", JSON.stringify(all));
  } catch(_) {}
}

// ── Toast ─────────────────────────────────────────────────────────
function showToast(msg, type="info") {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = `toast ${type}`;
  clearTimeout(state.toastTimer);
  state.toastTimer = setTimeout(() => t.classList.add("hidden"), 2800);
}

// ── Utility ───────────────────────────────────────────────────────
function esc(s) {
  return String(s || "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
